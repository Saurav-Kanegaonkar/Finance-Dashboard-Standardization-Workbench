<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Finance Dashboard Standardization Workbench</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Healthcare finance BI workbench</p>
        <h1>Finance Dashboard Standardization Workbench</h1>
      </div>
      <div class="status-card">
        <span>Operating goal</span>
        <strong>Standardize Power BI reporting, reduce recurring manual effort, and package SAC planning handoffs.</strong>
      </div>
    </header>

    <nav class="tabs" aria-label="Workbench views">
      <button class="tab is-active" type="button" data-view="cockpit">Cockpit</button>
      <button class="tab" type="button" data-view="standards">Standards Lab</button>
      <button class="tab" type="button" data-view="quality">Quality Control</button>
      <button class="tab" type="button" data-view="sac">SAC Handoff</button>
    </nav>

    <section class="kpi-grid" id="kpiGrid" aria-label="Executive metrics"></section>
    <section class="view" id="viewRoot" aria-live="polite"></section>
  </main>

  <script src="src/app.js"></script>
</body>
</html>
